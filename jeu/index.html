<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notre Univers ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

:root{
    --bg:#0d0d0d;
    --surface:#1a1a1a;
    --border:rgba(255,255,255,0.08);
    --text:#e8e8e8;
    --text-secondary:#999;
    --radius:10px;
}

body{
    min-height:100vh;
    font-family:'DM Sans',sans-serif;
    color:var(--text);

    background:
        radial-gradient(circle at top,
            rgba(123,104,238,0.18),
            transparent 30%),
        radial-gradient(circle at bottom right,
            rgba(255,111,157,0.12),
            transparent 25%),
        linear-gradient(180deg,#0d0d0d,#111111);

    display:flex;
    flex-direction:column;
    align-items:center;
}

/* HEADER */

header{
    width:100%;
    max-width:700px;
    padding:2rem 1.5rem;
    border-bottom:1px solid var(--border);
}

.header-content{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

h1{
    font-size:1.8rem;
    font-weight:600;
}

.subtitle{
    margin-top:.5rem;
    color:var(--text-secondary);
    font-size:.95rem;
}

.user-box{
    display:flex;
    align-items:center;
    gap:1rem;
}

.user-name{
    color:var(--text-secondary);
    font-size:.85rem;
}

.logout-btn{
    border:1px solid var(--border);
    background:transparent;
    color:var(--text-secondary);
    padding:.55rem .9rem;
    border-radius:var(--radius);
    cursor:pointer;
    transition:.2s;
}

.logout-btn:hover{
    color:white;
    border-color:white;
}

/* MAIN */

main{
    width:100%;
    max-width:700px;
    padding:2rem 1.5rem;
}

.section-title{
    color:var(--text-secondary);
    text-transform:uppercase;
    letter-spacing:.08em;
    font-size:.8rem;
    margin-bottom:1rem;
}

.games-grid{
    display:flex;
    flex-direction:column;
    gap:1rem;
}

/* GAME BUTTON */

.game-btn{
    width:100%;
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:14px;

    padding:1.25rem;

    text-decoration:none;
    color:inherit;

    display:flex;
    justify-content:space-between;
    align-items:center;

    transition:.25s;
}

.game-btn:hover{
    transform:translateY(-2px);
    border-color:rgba(255,255,255,.18);
}

.game-info{
    display:flex;
    flex-direction:column;
    gap:.3rem;
}

.game-title{
    font-size:1rem;
    font-weight:600;
}

.game-desc{
    font-size:.85rem;
    color:var(--text-secondary);
}

.arrow{
    font-size:1.2rem;
    color:var(--text-secondary);
}

/* FOOTER */

footer{
    margin-top:auto;
    padding:2rem;
    color:#666;
    font-size:.8rem;
}
</style>
</head>
<body>

<script>
if(localStorage.getItem("isLoggedIn") !== "true"){
    window.location.href = "login.html";
}
</script>

<header>
    <div class="header-content">
        <div>
            <h1>zoubizou ❤️</h1>
           
        </div>

        <div class="user-box">
            <span class="user-name" id="currentUser"></span>
            <button class="logout-btn" onclick="logout()">
                Quitter
            </button>
        </div>
    </div>
</header>

<main>

    <div class="section-title">
        Jeux disponibles
    </div>

    <div class="games-grid">

        <!-- Ton jeu actuel -->
        <a href="./GAGES/gages.html" class="game-btn">
            <div class="game-info">
                <div class="game-title">
                    🎴 Cartes Couples
                </div>
                <div class="game-desc">
                    GAGES.
                </div>
            </div>
            <span class="arrow">→</span>
        </a>

        <!-- Jeux futurs -->

        <a href="./36_questions/questions.html" class="game-btn">
            <div class="game-info">
                <div class="game-title">
                    🧠 Quiz de Couple
                </div>
                <div class="game-desc">
                    36 questions pour tomber amoureux (encore plus).
                </div>
            </div>
            <span class="arrow">→</span>
        </a>

    <a href="./jeu_de_loie/jeu_de_l_oie.html" class="game-btn">
            <div class="game-info">
                <div class="game-title">
                    🪿 Jeu de l'oie
                </div>
                <div class="game-desc">
                    a vos risques et périls.
                </div>
            </div>
            <span class="arrow">→</span>
        </a>
<!--     
        <a href="roulette.html" class="game-btn">
            <div class="game-info">
                <div class="game-title">
                    🎡 Roulette des Défis
                </div>
                <div class="game-desc">
                    Un défi aléatoire à relever ensemble.
                </div>
            </div>
            <span class="arrow">→</span>
        </a>

        <a href="bucketlist.html" class="game-btn">
            <div class="game-info">
                <div class="game-title">
                    ✨ Bucket List
                </div>
                <div class="game-desc">
                    Créez vos futurs souvenirs.
                </div>
            </div>
            <span class="arrow">→</span>
        </a>-->

    </div>

</main>

<footer>
    Fait avec ❤️
</footer>

<script>
function logout(){
    localStorage.removeItem("isLoggedIn");
    localStorage.removeItem("currentUser");
    window.location.href = "login.html";
}

const currentUser = localStorage.getItem("currentUser");

if(currentUser){
    document.getElementById("currentUser").textContent =
        currentUser;
}
</script>

</body>
</html>
