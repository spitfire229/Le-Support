<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="../img/icon.png" />
    <link rel="stylesheet" href="../CSS/style-desktop.css" media="screen and (min-width: 768px)">
    <link rel="stylesheet" href="../CSS/style-mobile.css" media="screen and (max-width: 767px)">
    <link rel="stylesheet" href="../CSS/footer.CSS">
    <link rel="stylesheet" href="../CSS/perso.css">
    <style>


    </style>
    <title>Formulaire</title>
</head>
<body>
    
    <div class="container-signaler">
        <img src="../img/signaler une erreur.png" class="center40" alt="">
        
            <p class="bold">Merci pour votre retour !</p>
            <p>
                Vos commentaires nous aident à améliorer notre site et à offrir une meilleure expérience à tous nos utilisateurs. Nous apprécions votre aide pour signaler les erreurs.
            </p>
        <br><br>
        <form id="errorReportForm">
            <div class="form-group">
                <label for="name">Nom:</label>
                <input type="text" id="name" name="name" required>
            </div>
          
            <div class="form-group center90">
                <label>Type d'erreur:</label>
                <div class="checkbox-group ">
                    <label><input type="checkbox" name="errorType" value="Bug graphique"> Bug graphique</label>
                    <label><input type="checkbox" name="errorType" value="Erreur de fond"> Erreur de fond</label>
                    <label><input type="checkbox" name="errorType" value="Erreur de forme"> Erreur de forme</label>
                    <label><input type="checkbox" name="errorType" value="Autres erreurs"> Autres erreurs...</label>
                </div>
            </div>
           
            <div class="form-group">
                <label for="pageUrl">Page où se trouve l'erreur:</label>
                <select id="pageUrl" name="pageUrl" required>
                    <option value="Accueil">Accueil </option>
                    <option value="BDD">Base de données</option>
                    <option value="Blog">Blog</option>
                    <option value="citations">citations</option>
                    <option value="JP">jurisprudence</option>
                    <option value="lexiques">lexique</option>
                    <option value="Services">Méthodologie</option>
                    <option value="maximes-latines">Maximes latines</option>
                    <option value="publications">Pulications</option>
                    <option value="schemas">Schemas</option>
                    <option value="sources">Sources</option>
                    <option value="QCM">QCM</option>
                    <option value="autre...">Autre...</option>
                </select>
            </div>
            <div class="form-group">
                <label for="errorDescription">Description de l'erreur:</label>
                <textarea id="errorDescription" name="errorDescription" rows="5" required></textarea>
            </div>
            <div class="form-group">
                <button type="submit">Envoyer</button>
            </div>
        </form>
    </div>
    <footer class="footer">
    
        <ul>
            <li><a href="../index.html"><img class="footer-ico" src="../img/footer accueil.png" alt=""></a></li>
            <li><a href="../arborescence/CGU.html"><img class="footer-ico" src="../img/footer CGU.png" alt=""></a></li>
            <li><a href="../arborescence/signaler.html"><img class="footer-ico"src="../img/footer erreur.png" alt=""></a></li>
        </ul>
       
        <img class="footer-logo" src="../img/logo 4.0.png" alt="Description de l'image"> 
        <p>©2024 lesupport.me</p>
    <img class="footer-fond" src="../img/footer nanterre.png" alt="">
    </footer>
      
    <script>

        document.getElementById('errorReportForm').addEventListener('submit', function(event) {
            event.preventDefault();

            const name = document.getElementById('name').value;
            
            const pageUrl = document.getElementById('pageUrl').value;
            const errorDescription = document.getElementById('errorDescription').value;

            // Récupération des valeurs des cases à cocher sélectionnées
            const errorTypes = Array.from(document.querySelectorAll('input[name="errorType"]:checked'))
                .map(checkbox => checkbox.value)
                .join(', ');

            const subject = encodeURIComponent("Signalement d'une erreur sur le site");
            const body = encodeURIComponent(
                `Nom: ${name}\nPage: ${pageUrl}\nType d'erreur: ${errorTypes}\n\nDescription de l'erreur:\n${errorDescription}`
            );

            const mailtoLink = `mailto:lesuppetudiant@gmail.com?subject=${subject}&body=${body}`;

            window.location.href = mailtoLink;
        });

    </script> 
</body>
</html>
