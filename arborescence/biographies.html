  <script>
const topSection = document.querySelector('.top-section');

topSection.addEventListener('mouseenter', () => {
  topSection.addEventListener('wheel', scrollHorizontally);
});

topSection.addEventListener('mouseleave', () => {
  topSection.removeEventListener('wheel', scrollHorizontally);
});

function scrollHorizontally(event) {
  if (event.deltaY !== 0) {
    event.preventDefault();
  }
  topSection.scrollLeft += event.deltaY;
}



  </script>
