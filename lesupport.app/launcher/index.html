<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Installer MyApp</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; padding: 20px; }
        .progress { width: 100%; background: #ccc; border-radius: 5px; overflow: hidden; margin-top: 10px; }
        .progress-bar { height: 20px; background: #4CAF50; width: 0%; }
        button { margin-top: 10px; padding: 10px; }
    </style>
</head>
<body>
    <h2>Choisissez les composants à installer :</h2>
    <label><input type="checkbox" value="component1"> Composant 1</label><br>
    <label><input type="checkbox" value="component2"> Composant 2</label><br>
    <label><input type="checkbox" value="component3"> Composant 3</label><br>
    
    <button id="install">Installer</button>
    
    <div class="progress">
        <div class="progress-bar" id="progress-bar"></div>
    </div>
    <p id="status">En attente...</p>

    <script>
        const { ipcRenderer } = require('electron');

        document.getElementById('install').addEventListener('click', () => {
            const selectedComponents = Array.from(document.querySelectorAll('input[type=checkbox]:checked'))
                .map(cb => cb.value);

            if (selectedComponents.length === 0) {
                alert('Veuillez sélectionner au moins un composant.');
                return;
            }

            document.getElementById('status').innerText = 'Téléchargement en cours...';
            ipcRenderer.send('start-download', selectedComponents);
        });

        ipcRenderer.on('download-progress', (event, { progress, total }) => {
            const percent = Math.round((progress / total) * 100);
            document.getElementById('progress-bar').style.width = percent + '%';
            document.getElementById('status').innerText = `Progression : ${percent}%`;
        });
 
        ipcRenderer.on('download-success', (event, message) => {
            console.log(message);
        });

        ipcRenderer.on('extract-success', (event, message) => {
            document.getElementById('status').innerText = 'Installation terminée !';
        });

        ipcRenderer.on('download-error', (event, message) => {
            document.getElementById('status').innerText = 'Erreur lors du téléchargement.';
            alert(message);
        });

        ipcRenderer.on('extract-error', (event, message) => {
            document.getElementById('status').innerText = 'Erreur lors de l\'extraction.';
            alert(message);
        });
    </script>
</body>
</html>
