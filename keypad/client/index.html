<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Keypad Téléphone</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <h1>Keypad</h1>
  <div class="keypad">
    <button onclick="send('1')">1</button>
    <button onclick="send('2')">2</button>
    <button onclick="send('3')">3</button><br>
    <button onclick="send('4')">4</button>
    <button onclick="send('5')">5</button>
    <button onclick="send('6')">6</button><br>
    <button onclick="send('7')">7</button>
    <button onclick="send('8')">8</button>
    <button onclick="send('9')">9</button><br>
    <button onclick="send('0')">0</button>
    <button onclick="send('enter')">⏎</button>
    <button onclick="send('backspace')">⌫</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
