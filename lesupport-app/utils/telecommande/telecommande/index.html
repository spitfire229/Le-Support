<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Télécommande</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
    <img class="logo" src="./logo .png" alt="">
  <h1>telecommande</h1>

  <select id="modeSelector">
    <option value="buttons">🎛️ Mode Boutons</option>
    <option value="trackpad"><img class="icon" src="./trackpad.svg" alt=""> Mode Trackpad</option>
    <option value="keypad">🔢 Mode Keypad</option>

  </select>

<div id="buttonsMode" class="mode">
  <button data-cmd="play">
    <img class="icon" src="./play.svg" alt="Play Icon" />
    Play
  </button>
  <button data-cmd="pause">
    <img class="icon" src="./stop.svg" alt="Pause Icon" />
    Pause
  </button>
  <button data-cmd="volume-up">
    <img class="icon" src="./volume-up.svg" alt="Volume Up Icon" />
    Volume +
  </button>
  <button data-cmd="volume-down">
    <img class="icon" src="./volume-down.svg" alt="Volume Down Icon" />
    Volume -
  </button>
</div>


  <div id="trackpadMode" class="mode" style="display: none;">
    <label for="sensitivity">Sensibilité souris : <span id="sensValue">1.0</span></label><br/>
    <input type="range" id="sensitivity" min="0.1" max="5" step="0.1" value="1" />

    <div id="trackpadArea"><img class="trackpad" src="./trackpad.svg" alt=""> Déplace ton doigt ici</div>
    
  </div>

  <div id="keypadMode" class="mode" style="display: none;">
  <div id="keypadGrid" class="grid">
    <!-- Les boutons seront injectés ici dynamiquement -->
  </div>
  <button id="editKeypad">✏️ Modifier le Keypad</button>
  <div id="commandPicker">
  <button id="openCommandList">📚 Ajouter une commande</button>
  <div id="commandList" class="hidden">
    <ul>
      <li data-command="openNotion">📓 Ouvrir Notion</li>
      <li data-command="muteZoom">🔇 Couper le micro Zoom</li>
      <li data-command="startPomodoro">⏱️ Démarrer Pomodoro</li>
      <li data-command="openDrive">💾 Accéder à Google Drive</li>
      <li data-command="takeScreenshot">📸 Faire une capture d’écran</li>
      <li data-command="launchMusic">🎧 Lancer playlist de focus</li>
      <li data-command="sendEmoji">😎 Envoyer emoji au prof</li>
    </ul>
  </div>
</div>

</div>


  <script src="script.js"></script>
</body>
</html>
